query Products($locale: SiteLocale, $skip: IntType) {
  allProducts(
    orderBy: _createdAt_DESC
    first: "100"
    locale: $locale
    skip: $skip
  ) {
    _publishedAt
    _modelApiKey
    slugs: _allSlugLocales {
      locale
      value
    }
    slug
    id
    title
    abstract
    seoTags {
      description
      image {
        responsiveImage {
          srcSet
          webpSrcSet
          sizes
          src
          width
          height
          aspectRatio
          alt
          title
          bgColor
          base64
        }
      }
    }
    productImage {
      responsiveImage(
        sizes: "(min-width:768px) 50vw, (min-width:1024px) 33vw, 100vw, 500px"
        imgixParams: { auto: [format, compress], fit: crop, ar: "7:8" }
      ) {
        ...rImage
      }
    }
  }
  _allProductsMeta(locale: $locale, filter: { title: { isBlank: "false" } }) {
    count
  }
}
