    ...brandSectionRecord
  }
  ... on ElementsListRecord {
    ...elementsListRecord
  }
  ... on FormBlockRecord {
    ...formBlockRecord
  }
  ... on SlideshowRecord {
    ...slideshowRecord
  }
  ... on TestimonialsBlockRecord {
    ...testimonialsBlockRecord
  }
  ... on TextBlockRecord {
    ...textBlockRecord
  }
  ... on ImageBlockRecord {
    ...imageBlockRecord
  }
  ... on GallerySectionRecord {
    ...gallerySectionRecord
  }
  ... on MasonryRecord {
    id
    _modelApiKey
    images {
      ...imageBlockRecord
    }
  }
