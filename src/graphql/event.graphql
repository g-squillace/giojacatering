query Event(
  $slug: String
  $locale: SiteLocale
  $fallbackLocale: [SiteLocale!]
) {
  event(
    filter: { slug: { eq: $slug }, title: { isBlank: "false" } }
    locale: $locale
    fallbackLocales: $fallbackLocale
  ) {
    _publishedAt
    _modelApiKey
    date: _createdAt
    dateStartEvent
    dateEndEvent
    title
    abstract
    eventImage {
      responsiveImage(
        sizes: "(min-width:768px) 80vw, 100vw, 1200px"
        imgixParams: { auto: [format, compress], fit: crop, ar: "2:1" }
      ) {
        ...rImage
      }
    }
    tags {
      id
      tag
      slug
      _modelApiKey
      slugs: _allTagLocales {
        locale
        value
      }
    }
    slugs: _allSlugLocales {
      locale
      value
    }
    content {
      value
      links {
        _publishedAt
        __typename
        slug
        id
        title
        tags {
          tag
        }
        seoTags {
          description
          image {
            responsiveImage {
              srcSet
              webpSrcSet
              sizes
              src
              width
              height
              aspectRatio
              alt
              title
              bgColor
              base64
            }
          }
        }
      }
      blocks {
        ... on ImageBlockRecord {
          ...imageBlockRecord
        }
        ... on AttachmentsBlockRecord {
          ...attachmentsBlockRecord
        }
        ... on VideoSectionRecord {
          ...videoSectionRecord
        }
        ... on GallerySectionRecord {
          ...gallerySectionRecord
        }
      }
    }
  }
  allPosts(
    filter: { title: { isBlank: "false" } }
    orderBy: _createdAt_DESC
    first: "3"
    locale: $locale
    fallbackLocales: $fallbackLocale
  ) {
    ...postPreviewFragment
  }
  allEvents(
    filter: { title: { isBlank: "false" } }
    orderBy: _createdAt_DESC
    first: "3"
    locale: $locale
    fallbackLocales: $fallbackLocale
  ) {
    ...eventPreviewFragment
  }
  _allPostsMeta(locale: $locale, filter: { title: { isBlank: "false" } }) {
    count
  }
  _allEventsMeta(locale: $locale, filter: { title: { isBlank: "false" } }) {
    count
  }
  layout(locale: $locale, fallbackLocales: $fallbackLocale) {
    footerSubtitle
    socialMediaLinks {
      url
      name
      id
      icon {
        url
        height
        width
      }
    }
  }

  allTags {
    _allReferencingPostsMeta {
      count
    }
    tag
    slug
    id
    slugs: _allSlugLocales {
      locale
      value
    }
    _modelApiKey
  }
}
